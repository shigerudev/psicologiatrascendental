# Espejo Espiritual - Configuración
spring.application.name=espejo-espiritual-backend
server.port=8080

# MVP: sin persistencia. Para producción, habilitar JPA + PostgreSQL.

# Servir frontend desde ../frontend (relativo al backend)
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:../frontend/
