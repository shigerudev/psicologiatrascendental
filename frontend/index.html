<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsychoGAT - Espacio Introspectivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <main class="chat-container glass-panel">
        <header class="chat-header">
            <div class="logo-area">
                <div class="symbol">Ψ</div>
                <h1>PsychoGAT</h1>
            </div>
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="status-text">Espacio Seguro</span>
            </div>
        </header>

        <div class="chat-messages" id="chatMessages">
            <div class="message system-message">
                <p>Bienvenido al espacio de Psicología Trascendental. Este es un entorno seguro para explorar tu mundo interior. ¿Qué sientes en este momento?</p>
            </div>
        </div>

        <footer class="chat-input-area">
            <div class="input-wrapper glass-panel-inner">
                <textarea id="userInput" placeholder="Describe tu experiencia interna..." rows="1"></textarea>
                <button id="sendBtn" aria-label="Enviar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
